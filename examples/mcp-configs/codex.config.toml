# Merge this block into ~/.codex/config.toml (or .codex/config.toml in a trusted project).
# Docs: https://developers.openai.com/codex/mcp

[mcp_servers.aywebp]
command = "aywebp-mcp"
enabled = true
startup_timeout_sec = 30
tool_timeout_sec = 120

[mcp_servers.aywebp.env]
AYWEBP_ALLOWED_ROOTS = "D:\\Projects"

